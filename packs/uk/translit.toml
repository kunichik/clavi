# KMU 2010 Ukrainian transliteration standard
# Source: Cabinet of Ministers of Ukraine Resolution No. 55, January 27, 2010
# Maps Latin (phonetic) -> Ukrainian Cyrillic

[rules]
# Multi-char rules first (digraphs/trigraphs — longest match wins in engine)
"shch" = "щ"
"Shch" = "Щ"
"SHCH" = "Щ"
"zh"   = "ж"
"Zh"   = "Ж"
"ZH"   = "Ж"
"kh"   = "х"
"Kh"   = "Х"
"KH"   = "Х"
"ts"   = "ц"
"Ts"   = "Ц"
"TS"   = "Ц"
"ch"   = "ч"
"Ch"   = "Ч"
"CH"   = "Ч"
"sh"   = "ш"
"Sh"   = "Ш"
"SH"   = "Ш"
"iu"   = "ю"
"Iu"   = "Ю"
"IU"   = "Ю"
"ia"   = "я"
"Ia"   = "Я"
"IA"   = "Я"
"ie"   = "є"
"Ie"   = "Є"
"IE"   = "Є"
"yi"   = "ї"
"Yi"   = "Ї"
"YI"   = "Ї"

# Ukrainian apostrophe: separates consonant from iotated vowel (e.g. m'iaso → мʼясо)
"'"  = "ʼ"

# Single-char rules
"a"  = "а"
"A"  = "А"
"b"  = "б"
"B"  = "Б"
"v"  = "в"
"V"  = "В"
"h"  = "г"
"H"  = "Г"
"g"  = "ґ"
"G"  = "Ґ"
"d"  = "д"
"D"  = "Д"
"e"  = "е"
"E"  = "Е"
"z"  = "з"
"Z"  = "З"
"y"  = "и"
"Y"  = "И"
"i"  = "і"
"I"  = "І"
"j"  = "й"
"J"  = "Й"
"k"  = "к"
"K"  = "К"
"l"  = "л"
"L"  = "Л"
"m"  = "м"
"M"  = "М"
"n"  = "н"
"N"  = "Н"
"o"  = "о"
"O"  = "О"
"p"  = "п"
"P"  = "П"
"r"  = "р"
"R"  = "Р"
"s"  = "с"
"S"  = "С"
"t"  = "т"
"T"  = "Т"
"u"  = "у"
"U"  = "У"
"f"  = "ф"
"F"  = "Ф"
"x"  = "кс"
"X"  = "КС"
"c"  = "с"
"C"  = "С"
"q"  = "к"
"Q"  = "К"
"w"  = "в"
"W"  = "В"
